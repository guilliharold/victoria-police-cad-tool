<script>
// ═══════════════════════════════════════════════════════════
// CSV LOADER
// Fetches stations.csv from the same directory as index.html.
// Falls back to the inline REGION_DATA template if the fetch
// fails (e.g. when running locally from the file system).
//
// CSV columns (header row required):
//   code, name, region, region_label, division, div_code,
//   psa, classification
// ═══════════════════════════════════════════════════════════
async function loadCSV() {
  try {
    const res = await fetch('stations.csv');
    if (!res.ok) throw new Error('not found');
    const text = await res.text();
    ingestCSV(text);
    console.log('stations.csv loaded');
  } catch(e) {
    console.warn('stations.csv not found — using inline template data.');
  }
  populateRegionDropdown();
}

function parseCSVLine(line) {
  // Handles quoted fields containing commas
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  out.push(cur.trim());
  return out;
}

function ingestCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#'));
  if (lines.length < 2) return;

  const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim());
  const idx = h => headers.indexOf(h);

  // Clear all existing inline station entries, keep division keys
  Object.values(REGION_DATA).forEach(reg => {
    Object.keys(reg.divisions).forEach(div => {
      reg.divisions[div] = [];
    });
  });

  // Also collect new regions/divisions from CSV
  for (let i = 1; i < lines.length; i++) {
    const f = parseCSVLine(lines[i]);
    if (f.length < 2) continue;

    const code           = (f[idx('code')]           || '').toUpperCase();
    const name           = f[idx('name')]             || '';
    const regionKey      = (f[idx('region')]          || '').toUpperCase();
    const regionLabel    = f[idx('region_label')]     || regionKey;
    const divisionName   = f[idx('division')]         || 'Unknown Division';
    const divCode        = f[idx('div_code')]         || '';
    const psa            = f[idx('psa')]              || '';
    const classification = f[idx('classification')]   || 'suburban';

    if (!code || !name || !regionKey) continue;

    // Create region if new
    if (!REGION_DATA[regionKey]) {
      REGION_DATA[regionKey] = { label: regionLabel, divisions: {} };
      addRegionOption(regionKey, regionLabel);
    }

    // Create division if new
    if (!REGION_DATA[regionKey].divisions[divisionName]) {
      REGION_DATA[regionKey].divisions[divisionName] = [];
    }

    // 'CODE|Name|DivCode|PSA|classification'
    REGION_DATA[regionKey].divisions[divisionName].push(
      `${code}|${name}|${divCode}|${psa}|${classification}`
    );
  }

  // Remove any divisions left empty after CSV load
  Object.values(REGION_DATA).forEach(reg => {
    Object.keys(reg.divisions).forEach(div => {
      if (reg.divisions[div].length === 0) delete reg.divisions[div];
    });
  });
}

function addRegionOption(key, label) {
  const sel = document.getElementById('selRegion');
  // Don't duplicate
  if ([...sel.options].some(o => o.value === key)) return;
  const o = document.createElement('option');
  o.value = key; o.textContent = label;
  sel.appendChild(o);
}

function populateRegionDropdown() {
  // The four built-in options are already in the HTML.
  // This ensures any CSV-added regions also appear.
  Object.keys(REGION_DATA).forEach(key => {
    addRegionOption(key, REGION_DATA[key].label);
  });
}

      'Knox (ED2)':           ['TBC1|Station TBC|ED2||suburban', 'TBC2|Station TBC|ED2||suburban'],
      'Goulburn Valley (ED3)':['TBC1|Station TBC|ED3||suburban', 'TBC2|Station TBC|ED3||suburban'],
      'Wangaratta (ED4)':     ['TBC1|Station TBC|ED4||suburban', 'TBC2|Station TBC|ED4||suburban'],
      'Morwell (ED5)':        ['TBC1|Station TBC|ED5||suburban', 'TBC2|Station TBC|ED5||suburban'],

function parseStation(s) {
  const p = s.split('|');
  return {
    code:           p[0] || '',
    name:           p[1] || '',
    div:            p[2] || '',
    psa:            p[3] || '',
    classification: p[4] || 'suburban',
  };
}

  {id:'mounted',icon:'🐴', name:'Mounted Branch (MOU)',     desc:'Mounted unit. MOU prefix, 800–899.'},

// ═══════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════
const S = {
  stationCode:'', stationName:'', regionLabel:'', divisionLabel:'',
  psa:'', role:'suburban',
  selected: new Set()
};

const OVERRIDES = {};

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-AU',{hour12:false})},1000);

// ═══════════════════════════════════════════════════════════
// STEP NAV
// ═══════════════════════════════════════════════════════════
function go(n){
  [1,2,3].forEach(i=>{
    document.getElementById('p'+i).classList.toggle('show',i===n);
    const t=document.getElementById('tab'+i);
    t.classList.remove('active','done');
    if(i===n)t.classList.add('active');
    else if(i<n)t.classList.add('done');
  });
}

// ═══════════════════════════════════════════════════════════
// STEP 1
// ═══════════════════════════════════════════════════════════
function onRegion(){
  const r=document.getElementById('selRegion').value;
  const dSel=document.getElementById('selDiv');
  dSel.innerHTML='<option value="">— Select Division —</option>';
  dSel.disabled=!r;
  document.getElementById('selStation').innerHTML='<option value="">— Select Division first —</option>';
  document.getElementById('selStation').disabled=true;
  document.getElementById('roleCard').style.display='none';
  if(r&&REGION_DATA[r])Object.keys(REGION_DATA[r].divisions).forEach(d=>{
    const o=document.createElement('option');o.value=d;o.textContent=d;dSel.appendChild(o);
  });
}
function onDiv(){
  const r=document.getElementById('selRegion').value;
  const d=document.getElementById('selDiv').value;
  const sSel=document.getElementById('selStation');
  sSel.innerHTML='<option value="">— Select Station —</option>';
  sSel.disabled=!d;
  document.getElementById('roleCard').style.display='none';
  if(r&&d&&REGION_DATA[r]&&REGION_DATA[r].divisions[d])
    REGION_DATA[r].divisions[d].forEach(entry=>{
      const st=parseStation(entry);
      const o=document.createElement('option');
      o.value=entry;
      o.textContent=`${st.name} (${st.code})`;
      sSel.appendChild(o);
    });
}
function onStation(){
  const entry = document.getElementById('selStation').value;
  const roleCard = document.getElementById('roleCard');
  roleCard.style.display = entry ? 'block' : 'none';
  if (entry) {
    const st = parseStation(entry);
    // Pre-select classification from CSV if available
    if (st.classification) {
      document.getElementById('knownRole').value = st.classification;
    }
  }
}
function goStep2(){
  const sel=document.getElementById('selStation').value;
  if(!sel){alert('Please select a station.');return;}
  const st=parseStation(sel);
  S.stationCode=st.code;
  S.stationName=st.name;
  S.psa=st.psa;
  S.role=document.getElementById('knownRole').value;
  const r=document.getElementById('selRegion').value;
  S.regionLabel=r?REGION_DATA[r].label:'';
  S.divisionLabel=document.getElementById('selDiv').value||'';
  buildServiceGrid();
  go(2);
}

// ═══════════════════════════════════════════════════════════
// STEP 2
// ═══════════════════════════════════════════════════════════
function buildServiceGrid(){
  const g=document.getElementById('svcGrid');g.innerHTML='';
  SERVICES.forEach(sv=>{
    const el=document.createElement('div');
    el.className='svc-item'+(S.selected.has(sv.id)?' on':'');
    el.dataset.id=sv.id;
    el.innerHTML=`<div class="svc-check">${S.selected.has(sv.id)?'✓':''}</div><div class="svc-text"><div class="svc-name">${sv.icon} ${sv.name}</div><div class="svc-desc">${sv.desc}</div></div>`;
    el.onclick=()=>{
      if(S.selected.has(sv.id)){S.selected.delete(sv.id);el.classList.remove('on');el.querySelector('.svc-check').textContent='';}
      else{S.selected.add(sv.id);el.classList.add('on');el.querySelector('.svc-check').textContent='✓';}
    };
    g.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

// Fisher-Yates shuffle (in-place, returns array)
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// Interleave pre-shuffled shift buckets into MS→AS→NS→MS→AS→NS order.
// 'fixed' items are always appended at the end unchanged.
function interleave(ms, as, ns, fixed=[]){
  const out=[];
  const max=Math.max(ms.length, as.length, ns.length);
  for(let i=0;i<max;i++){
    if(i<ms.length) out.push(ms[i]);
    if(i<as.length) out.push(as[i]);
    if(i<ns.length) out.push(ns[i]);
  }
  return out.concat(fixed);
}

// ═══════════════════════════════════════════════════════════
// UNIT POOL BUILDERS
// Numbers within each shift bucket are shuffled on every call
// so each generation produces a different but valid lineup.
// The interleaved MS→AS→NS order is always preserved so the
// slider gives a balanced spread at any count.
// ═══════════════════════════════════════════════════════════
function buildCarPool(c){
  const ms=shuffle([201,204,207,208,205].map(n=>({cs:c+n,desc:'Station Car — Morning shift (0700)',  shifts:['MS']})));
  const as=shuffle([203,206,209,202,210].map(n=>({cs:c+n,desc:'Station Car — Afternoon shift (1500)',shifts:['AS']})));
  const ns=shuffle([211,214,217,212,215].map(n=>({cs:c+n,desc:'Station Car — Night shift (2300)',    shifts:['NS']})));
  return interleave(ms, as, ns);
}

function buildVanPool(c){
  const ms=shuffle([307,308].map(n=>({cs:c+n,desc:'Divisional Van — Morning shift (0700)',  shifts:['MS']})));
  const as=shuffle([303,304].map(n=>({cs:c+n,desc:'Divisional Van — Afternoon shift (1500)',shifts:['AS']})));
  const ns=shuffle([311,312].map(n=>({cs:c+n,desc:'Divisional Van — Night shift (2300)',    shifts:['NS']})));
  return interleave(ms, as, ns);
}

function buildHWPPool(c){
  // Patrol cars shuffled within shift groups; supervisors + base always last
  const cars_ms=shuffle([612,613].map(n=>({cs:c+n,desc:'HWP Marked Car',shifts:['MS']})));
  const cars_as=shuffle([617].map(n=>({cs:c+n,desc:'HWP Marked Car',shifts:['AS','NS']})));
  const cars_ns=shuffle([618].map(n=>({cs:c+n,desc:'HWP Marked Car',shifts:['NS']})));
  const core=interleave(cars_ms, cars_as, cars_ns);
  // Specialty units appended in fixed order (motorcycle, Q car, SGT, S/SGT, base)
  const extra=[
    {cs:c+'600',desc:'HWP Solo Motorcycle',     shifts:['MS','AS']},
    {cs:c+'601',desc:'HWP Solo Motorcycle',     shifts:['AS']},
    {cs:c+'630',desc:'HWP Q Car (unmarked)',     shifts:['MS','AS']},
    {cs:c+'650',desc:'HWP Sergeant',            shifts:['MS','AS']},
    {cs:c+'651',desc:'HWP Sergeant',            shifts:['NS']},
    {cs:c+'661',desc:'HWP Senior Sergeant',     shifts:['MS']},
    {cs:c+'906',desc:'HWP Base Station (fixed)',shifts:['FIXED']},
  ];
  return core.concat(extra);
}

function buildCIUPool(c){
  // CIU numbers have specific meanings so shuffle within each shift's valid range
  const ms=shuffle([507,508].map(n=>({cs:c+n,desc:'CIU — Morning shift',shifts:['MS']})));
  const as=shuffle([503,504,520].map(n=>({cs:c+n,desc:'CIU — Afternoon shift',shifts:['AS']})));
  const ns=shuffle([541,542,543].map(n=>({cs:c+n,desc:'CIU — Night shift',shifts:['NS']})));
  const fixed=[
    {cs:c+'550',desc:'CIU Night Supervisor',    shifts:['NS']},
    {cs:c+'905',desc:'CIU Base Station (fixed)',shifts:['FIXED']},
  ];
  return interleave(ms, as, ns, fixed);
}

function buildPORTPool(c){
  // Shuffle the special-duties numbers within each loosely-defined shift group
  const ms=shuffle([700,710,750].map(n=>({cs:c+n,desc:'Special Duties',shifts:['MS','AS']})));
  const as=shuffle([730,731].map(n=>({cs:c+n,desc:'Special Events / Emergency Response',shifts:['AS','NS']})));
  const mixed=shuffle([740,741,745,780].map(n=>({cs:c+n,desc:
    n===740||n===741?'Foot Patrol':n===745?'Licensing Unit':'Bicycle Patrol',
    shifts:n===741?['AS']:['MS','AS']})));
  const fixed=[
    {cs:c+'783',desc:'Court Security Guard',                      shifts:['MS','AS']},
    {cs:c+'785',desc:'Hospital Guard',                            shifts:['MS','AS','NS']},
    {cs:c+'920',desc:'DOSO — District Operational Support Office',shifts:['MS']},
  ];
  // Interleave the three variable groups, then append fixed
  return interleave(ms, as, mixed, fixed);
}

function buildRRUPool(c){
  // RRU numbers are tight (440–443) — shuffle the shift units, base always last
  const ms=[{cs:c+'440',desc:'RRU — Morning shift',  shifts:['MS']}];
  const as=[{cs:c+'441',desc:'RRU — Afternoon shift',shifts:['AS']}];
  const ns=[{cs:c+'442',desc:'RRU — Night shift',    shifts:['NS']}];
  const fixed=[
    {cs:c+'443',desc:'RRU — Additional unit',       shifts:['MS','AS']},
    {cs:c+'904',desc:'RRU Base Station (fixed)',     shifts:['FIXED']},
  ];
  return interleave(ms, as, ns, fixed);
}

// ═══════════════════════════════════════════════════════════
// DEFAULT COUNTS by role
// ═══════════════════════════════════════════════════════════
const DEFAULTS={
  metropolitan: {cars:12, vans:6, hwp:11, ciu:10, port:12, rru:5},
  suburban:     {cars:7,  vans:3, hwp:5,  ciu:5,  port:6,  rru:3},
  regional:     {cars:9,  vans:4, hwp:8,  ciu:7,  port:8,  rru:4},
  rural:        {cars:3,  vans:2, hwp:2,  ciu:2,  port:2,  rru:2},
};
const MAX_UNITS={cars:15,vans:6,hwp:11,ciu:10,port:12,rru:5};

function defaultCount(svcId){
  const d=DEFAULTS[S.role]||DEFAULTS.suburban;
  return d[svcId]||3;
}

// ═══════════════════════════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════════════════════════
function generate(){
  if(S.selected.size===0){alert('Please select at least one service.');return;}
  // Reset overrides to defaults
  S.selected.forEach(id=>{ OVERRIDES[id]=defaultCount(id); });
  buildOutput();
  go(3);
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function shiftTag(s){
  if(s==='FIXED')return'<span class="tag tag-fixed">FIXED</span>';
  if(s==='ALL') return'<span class="tag tag-all">ALL SHIFTS</span>';
  if(s==='MS')  return'<span class="tag tag-ms">MS</span>';
  if(s==='AS')  return'<span class="tag tag-as">AS</span>';
  if(s==='NS')  return'<span class="tag tag-ns">NS</span>';
  return'';
}

function renderOutput(code,role,roleLabel,sections){
  const totalVisible=sections.reduce((a,sec)=>{
    if(sec.scalable)return a+(OVERRIDES[sec.id]||defaultCount(sec.id));
    return a+sec.units.length;
  },0);

  const roleDesc={
    metropolitan:'a metropolitan station serving a high-density urban environment',
    suburban:'a suburban station serving an established residential and commercial community',
    regional:'a regional hub coordinating policing across surrounding districts',
    rural:'a rural station serving a small town and surrounding agricultural community',
  }[role]||'a general duties station';
  let narr=`For an ideal configuration at <strong>${S.stationName} Police Station (${code})</strong>, ${roleDesc}`;
  if(S.divisionLabel)narr+=` for the <strong>${S.divisionLabel}</strong> division`;
  if(S.regionLabel)narr+=` in the <strong>${S.regionLabel} Region</strong>`;
  narr+=`, the following vehicle lineup is suggested. Units are listed across all shifts — morning (0700), afternoon (1500) and night (2300) crews may appear together. Use the <strong>unit count sliders</strong> on each service block to adjust numbers up or down.`;

  let linksHtml='';
  if(S.psa){
    linksHtml=`<div class="card" style="margin-bottom:14px"><div class="card-head"><div class="dot"></div>Station Support Links</div><div class="card-body"><div class="links-grid"><div class="link-item"><div class="link-key">Police Service Area (PSA)</div><div class="link-val">${S.psa}</div></div></div></div></div>`;
  }

  let blocksHtml='';
  sections.forEach(sec=>{
    const isScalable=!!sec.scalable;
    const count=isScalable?(OVERRIDES[sec.id]||defaultCount(sec.id)):sec.units.length;
    const maxCount=isScalable?(MAX_UNITS[sec.id]||sec.units.length):sec.units.length;

    let rows='';
    sec.units.forEach((u,idx)=>{
      const hidden=isScalable&&idx>=count;
      rows+=`<div class="unit-row${hidden?' hidden-unit':''}" id="urow-${sec.id}-${idx}">
        <span class="u-cs">${u.cs}</span>
        <span class="u-desc">${u.desc}</span>
        <div class="u-tags">${u.shifts.map(shiftTag).join('')}</div>
      </div>`;
    });

    const sliderHtml=isScalable?`
      <div class="slider-row">
        <span class="slider-label">Units</span>
        <div class="slider-wrap">
          <input type="range" min="1" max="${maxCount}" value="${count}"
            oninput="onSlider('${sec.id}',this.value)"
            id="sl-${sec.id}">
          <span class="slider-val" id="slv-${sec.id}">${count}</span>
        </div>
      </div>`:'';

    blocksHtml+=`<div class="svc-block">
      <div class="svc-block-head">
        <span class="svc-block-icon">${sec.icon}</span>
        <span class="svc-block-name">${sec.name}</span>
        <span class="svc-block-count" id="sc-${sec.id}">${count} unit${count!==1?'s':''}</span>
      </div>
      <div class="svc-block-body">
        ${sliderHtml}
        <div class="unit-table" id="ut-${sec.id}">${rows}</div>
        <div class="svc-note">${sec.note}</div>
      </div>
    </div>`;
  });

  // Export
  let exp=`VICTORIA POLICE — CAD LINEUP\n${'═'.repeat(46)}\n`;
  exp+=`Station  : ${S.stationName} Police Station (${code})\n`;
  if(S.divisionLabel)exp+=`Division : ${S.divisionLabel}\n`;
  if(S.regionLabel)exp+=`Region   : ${S.regionLabel}\n`;
  exp+=`Role     : ${roleLabel}\nUnits    : ${totalVisible}\n${'─'.repeat(46)}\n\n`;
  sections.forEach(sec=>{
    const count=sec.scalable?(OVERRIDES[sec.id]||defaultCount(sec.id)):sec.units.length;
    exp+=`${sec.name.toUpperCase()}\n`;
    sec.units.slice(0,count).forEach(u=>{exp+=`  ${u.cs.padEnd(12)} ${u.desc.padEnd(36)} [${u.shifts.join('/')}]\n`;});
    exp+='\n';
  });
  if(S.psa){
    exp+=`STATION SUPPORT LINKS\n`;
    exp+=`  PSA (Police Service Area) : ${S.psa}\n`;
  }

  const expDisplay=exp
    .replace(/^(VICTORIA POLICE.*)/gm,'<span class="ex-head">$1</span>')
    .replace(/^([═─]+)/gm,'<span class="ex-cmt">$1</span>')
    .replace(/^(Station|Division|Region|Role|Units|PSA)(\s*.*)/gm,'<span class="ex-cmt">$1$2</span>')
    .replace(/^([A-Z][A-Z &\/\(\)]+\n)/gm,'<span class="ex-sec">$1</span>')
    .replace(/\b([A-Z]{2,7}[0-9]{2,4})\b/g,'<span class="ex-cs">$1</span>');

  document.getElementById('output').innerHTML=`
    <div class="out-header">
      <div class="out-stn">${S.stationName} Police Station</div>
      <div class="out-sub">${code} · ${S.divisionLabel||''} ${S.regionLabel?'· '+S.regionLabel:''} · ${roleLabel}</div>
      <div class="out-meta">
        <div class="out-meta-item"><div class="out-meta-label">Station Code</div><div class="out-meta-val">${code}</div></div>
        <div class="out-meta-item"><div class="out-meta-label">Classification</div><div class="out-meta-val">${roleLabel}</div></div>
        <div class="out-meta-item"><div class="out-meta-label">Total Units</div><div class="out-meta-val" id="totalCount">${totalVisible}</div></div>
        <div class="out-meta-item"><div class="out-meta-label">Services</div><div class="out-meta-val">${sections.length}</div></div>
      </div>
    </div>
    <div class="narrative">${narr}</div>
    <div class="legend">
      <span class="legend-label">Shift key:</span>
      <span class="tag tag-ms">MS</span> Morning (0700) &nbsp;
      <span class="tag tag-as">AS</span> Afternoon (1500) &nbsp;
      <span class="tag tag-ns">NS</span> Night (2300) &nbsp;
      <span class="tag tag-fixed">FIXED</span> Base / Always-on
    </div>
    ${linksHtml}
    ${blocksHtml}
    <div class="export-box">
      <div class="export-head">
        <h3>Export / Copy</h3>
        <button class="btn-copy" onclick="copyExport()">Copy to Clipboard</button>
      </div>
      <div class="export-pre" id="expPre">${expDisplay}</div>
    </div>
    <div style="display:none" id="expRaw">${exp}</div>`;

  // Store sections ref for live slider updates
  window._sections=sections;
}

// ═══════════════════════════════════════════════════════════
// SLIDER HANDLER — live update without full re-render
// ═══════════════════════════════════════════════════════════
function onSlider(svcId, rawVal){
  const n=parseInt(rawVal,10);
  OVERRIDES[svcId]=n;

  // Update display value
  document.getElementById('slv-'+svcId).textContent=n;
  document.getElementById('sc-'+svcId).textContent=n+' unit'+(n!==1?'s':'');

  // Show/hide unit rows
  const sec=window._sections.find(s=>s.id===svcId);
  if(!sec)return;
  sec.units.forEach((_,idx)=>{
    const row=document.getElementById('urow-'+svcId+'-'+idx);
    if(row)row.classList.toggle('hidden-unit',idx>=n);
  });

  // Recount total
  const total=window._sections.reduce((a,s)=>{
    return a+(s.scalable?(OVERRIDES[s.id]||defaultCount(s.id)):s.units.length);
  },0);
  const tc=document.getElementById('totalCount');
  if(tc)tc.textContent=total;

  // Rebuild export text
  rebuildExport();
}

function rebuildExport(){
  const code=S.stationCode;
  const role=S.role;
  const roleLabel={metropolitan:'Metropolitan',suburban:'Suburban',regional:'Regional',rural:'Rural'}[role]||'Suburban';
  const sections=window._sections;
  const totalVisible=sections.reduce((a,s)=>a+(s.scalable?(OVERRIDES[s.id]||defaultCount(s.id)):s.units.length),0);

  let exp=`VICTORIA POLICE — CAD LINEUP\n${'═'.repeat(46)}\n`;
  exp+=`Station  : ${S.stationName} Police Station (${code})\n`;
  if(S.divisionLabel)exp+=`Division : ${S.divisionLabel}\n`;
  if(S.regionLabel)exp+=`Region   : ${S.regionLabel}\n`;
  exp+=`Role     : ${roleLabel}\nUnits    : ${totalVisible}\n${'─'.repeat(46)}\n\n`;
  sections.forEach(sec=>{
    const count=sec.scalable?(OVERRIDES[sec.id]||defaultCount(sec.id)):sec.units.length;
    exp+=`${sec.name.toUpperCase()}\n`;
    sec.units.slice(0,count).forEach(u=>{exp+=`  ${u.cs.padEnd(12)} ${u.desc.padEnd(36)} [${u.shifts.join('/')}]\n`;});
    exp+='\n';
  });
  if(S.psa){
    exp+=`STATION SUPPORT LINKS\n`;
    exp+=`  PSA (Police Service Area) : ${S.psa}\n`;
  }

  const raw=document.getElementById('expRaw');
  if(raw)raw.textContent=exp;

  const expDisplay=exp
    .replace(/^(VICTORIA POLICE.*)/gm,'<span class="ex-head">$1</span>')
    .replace(/^([═─]+)/gm,'<span class="ex-cmt">$1</span>')
    .replace(/^(Station|Division|Region|Role|Units|PSA)(\s*.*)/gm,'<span class="ex-cmt">$1$2</span>')
    .replace(/^([A-Z][A-Z &\/\(\)]+\n)/gm,'<span class="ex-sec">$1</span>')
    .replace(/\b([A-Z]{2,7}[0-9]{2,4})\b/g,'<span class="ex-cs">$1</span>');
  const pre=document.getElementById('expPre');
  if(pre)pre.innerHTML=expDisplay;
}

function copyExport(){
  navigator.clipboard.writeText(document.getElementById('expRaw').textContent).then(()=>{
    const b=document.querySelector('.btn-copy');
    b.textContent='✓ Copied!';setTimeout(()=>b.textContent='Copy to Clipboard',2000);
  });
}
</script>
